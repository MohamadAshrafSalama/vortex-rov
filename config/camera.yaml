camera:
  index: 0
  width: 1280
  height: 720
  fps: 30
  backend: v4l2       # v4l2 | auto | gstreamer
  buffer_size: 2      # V4L2 ring buffer depth

  # Second camera for stereo or overhead view
  secondary:
    enabled: false
    index: 1
    width: 640
    height: 480
    fps: 30

calibration:
  path: config/calibration.yaml
  apply: true
  alpha: 0.5          # free scaling parameter for getOptimalNewCameraMatrix

white_balance:
  method: gray_world  # gray_world | clahe | histogram_stretch | none
  clahe:
    clip_limit: 2.0
    tile_grid_size: [8, 8]
  histogram_stretch:
    percentile_low: 1
    percentile_high: 99
